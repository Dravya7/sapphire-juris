<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="sapphireMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6BB8F0"/>
      <stop offset="35%" stop-color="#2278C8"/>
      <stop offset="100%" stop-color="#0A4D9A"/>
    </linearGradient>
    <linearGradient id="sapphireSheen" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#A8D8FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2278C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sapphireDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A3D7A"/>
      <stop offset="100%" stop-color="#0A4D9A"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════════════
       SHIELD
  ══════════════════════════════════════════════ -->
  <!-- Outer shield — gold border -->
  <path d="M 62,22
           L 338,22
           C 354,22 360,32 360,48
           L 360,180
           C 360,255 298,318 200,358
           C 102,318 40,255 40,180
           L 40,48
           C 40,32 46,22 62,22 Z"
    fill="#C9A84C"/>

  <!-- Inner shield — dark fill (transparent-friendly) -->
  <path d="M 68,30
           L 332,30
           C 346,30 352,40 352,54
           L 352,178
           C 352,248 293,308 200,346
           C 107,308 48,248 48,178
           L 48,54
           C 48,40 54,30 68,30 Z"
    fill="#0D1B2A"/>

  <!-- Subtle inner border ring -->
  <path d="M 76,40
           L 324,40
           C 336,40 341,49 341,61
           L 341,177
           C 341,241 286,298 200,334
           C 114,298 59,241 59,177
           L 59,61
           C 59,49 64,40 76,40 Z"
    fill="none" stroke="rgba(201,168,76,0.22)" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       SAPPHIRE DIAMOND GEM
  ══════════════════════════════════════════════ -->
  <ellipse cx="200" cy="94" rx="28" ry="18" fill="rgba(100,180,255,0.12)"/>

  <polygon points="200,54  235,90  200,126  165,90"
    fill="url(#sapphireMain)" stroke="#C9A84C" stroke-width="1.8"/>

  <polygon points="200,54  165,90  200,82"
    fill="url(#sapphireSheen)"/>

  <polygon points="200,54  235,90  200,82"
    fill="#2278C8" opacity="0.55"/>

  <polygon points="165,90  200,82  200,126"
    fill="url(#sapphireDark)" opacity="0.8"/>

  <polygon points="235,90  200,82  200,126"
    fill="#0E4F8E" opacity="0.7"/>

  <polygon points="200,82  188,90  200,98  212,90"
    fill="rgba(200,235,255,0.35)"/>

  <polygon points="180,64  200,72  193,57"
    fill="white" opacity="0.55"/>
  <polygon points="175,75  186,80  181,69"
    fill="white" opacity="0.3"/>

  <polygon points="200,54  235,90  200,126  165,90"
    fill="none" stroke="#C9A84C" stroke-width="2.2"/>
  <line x1="166" y1="90" x2="234" y2="90" stroke="rgba(201,168,76,0.5)" stroke-width="0.8"/>
  <line x1="200" y1="54" x2="200" y2="126" stroke="rgba(201,168,76,0.35)" stroke-width="0.8"/>

  <!-- ══════════════════════════════════════════════
       SCALES OF JUSTICE
  ══════════════════════════════════════════════ -->
  <line x1="108" y1="170" x2="292" y2="170"
    stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>

  <circle cx="200" cy="170" r="5.5" fill="#C9A84C"/>
  <circle cx="200" cy="170" r="2.5" fill="#0D1B2A"/>

  <circle cx="120" cy="170" r="3" fill="#C9A84C"/>

  <line x1="120" y1="173" x2="120" y2="202"
    stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>

  <path d="M 97,202 Q 120,224 143,202"
    fill="none" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  <line x1="97" y1="202" x2="143" y2="202"
    stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="280" cy="170" r="3" fill="#C9A84C"/>

  <line x1="280" y1="173" x2="280" y2="202"
    stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>

  <path d="M 257,202 Q 280,224 303,202"
    fill="none" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  <line x1="257" y1="202" x2="303" y2="202"
    stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>

  <line x1="200" y1="170" x2="200" y2="258"
    stroke="#C9A84C" stroke-width="3.2" stroke-linecap="round"/>

  <line x1="189" y1="172" x2="211" y2="172"
    stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>

  <line x1="173" y1="258" x2="227" y2="258"
    stroke="#C9A84C" stroke-width="4" stroke-linecap="round"/>

  <line x1="163" y1="270" x2="237" y2="270"
    stroke="#C9A84C" stroke-width="3.2" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════
       WORDMARK BELOW SHIELD
  ══════════════════════════════════════════════ -->
  <text x="200" y="402"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="#F5F0E8"
    text-anchor="middle"
    letter-spacing="3">SAPPHIRE JURIS</text>

  <text x="358" y="390"
    font-family="Georgia, serif"
    font-size="15"
    font-weight="700"
    fill="#F5F0E8">®</text>

  <!-- Left gold line -->
  <line x1="38" y1="420" x2="112" y2="420" stroke="#C9A84C" stroke-width="1.5"/>
  <circle cx="117" cy="420" r="2" fill="#C9A84C"/>

  <text x="200" y="424"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10.5"
    font-weight="600"
    fill="#D4C5A0"
    text-anchor="middle"
    letter-spacing="2.5">ADVOCATES &amp; LEGAL CONSULTANTS</text>

  <circle cx="283" cy="420" r="2" fill="#C9A84C"/>
  <line x1="288" y1="420" x2="362" y2="420" stroke="#C9A84C" stroke-width="1.5"/>

  <text x="200" y="462"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="19"
    font-style="italic"
    fill="#C9A84C"
    text-anchor="middle">Where Law Meets Integrity.</text>
</svg>
